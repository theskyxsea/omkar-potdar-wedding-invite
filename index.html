<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HERO CAROUSEL -->

    <section class="hero">
      <div class="slider">
        <div class="slide active">
          <img src="images/photo1.jpeg" alt="" />
        </div>

        <div class="slide">
          <img src="images/photo2.jpeg" alt="" />
        </div>

        <div class="slide">
          <img src="images/photo3.jpeg" alt="" />
        </div>

        <div class="slide">
          <img src="images/photo4.jpeg" alt="" />
        </div>

        <div class="slide">
          <img src="images/photo5.jpeg" alt="" />
        </div>
      </div>

      <div class="overlay">
        <h1>अंकार ❤ गौरी</h1>
        <p>Wedding Invitation</p>
      </div>
    </section>

    <!-- INVITATION -->

    <section class="invite">
      <h2>शुभविवाह</h2>

      <p class="wedding-date">रविवार, १९ जून २०२६ | दुपारी १२:३३ वा.</p>
    </section>

    <section class="venue">
      <h2>📍 विवाह स्थळ</h2>

      <p>मोनिका लॉन्स</p>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3790.8696189289967!2d74.60417988178887!3d18.169919138654762!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc39fe44bd926e7%3A0xf57b20114879f1f!2sMonika%20Lawns!5e0!3m2!1sen!2sin!4v1782132441109!5m2!1sen!2sin"
          width="100%"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
      </div>
    </section>

    <!-- COUNTDOWN -->

    <section class="countdown">
      <h2>Wedding Countdown</h2>

      <div id="timer">Loading...</div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
